# Cloudflare Worker config for the Neon error-reporting endpoint.
#
# Deploy:
#   1. Authenticate: `wrangler login` (or set CLOUDFLARE_API_TOKEN).
#   2. Create the D1 database:
#        wrangler d1 create neon-errors
#      Copy the printed `database_id` into [[d1_databases]] below.
#   3. Apply schema: `wrangler d1 execute neon-errors --file ./schema.sql --remote`
#   4. Deploy: `wrangler deploy`
#   5. Note the published URL — write it into the Neon CLI default config
#      (src/reporter.rs DEFAULT_ENDPOINT, behind --no-reporting / opt-in).
#
# Local dev:
#   wrangler dev          # starts http://127.0.0.1:8787
#   wrangler d1 execute neon-errors --file ./schema.sql --local

name = "neon-errors"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

# Production environment binding for D1.
# database_id is filled in once the DB is created; left empty in the repo to
# avoid committing infra IDs that depend on Nick's CF account.
[[d1_databases]]
binding = "DB"
database_name = "neon-errors"
database_id = "TODO_fill_in_via_wrangler_d1_create"

# Per-IP rate limit: 30 requests / 60s. Keeps the free tier safe even if a
# misbehaving Neon installation reports in a tight loop.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 30, period = 60 }

# Logs: keep cheap.
[observability]
enabled = true
head_sampling_rate = 1
