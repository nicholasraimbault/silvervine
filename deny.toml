# cargo-deny configuration — license + advisory + ban-list policy.
# https://embarkstudios.github.io/cargo-deny/
# Run via `cargo deny check` (CI: `.github/workflows/ci.yml`).

[graph]
# Targets we actually ship, so deny only inspects relevant deps.
targets = [
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

[licenses]
# Allowed SPDX license identifiers. Anything outside this list fails the build.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.93
exceptions = []

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = [
    # OpenSSL: we use rustls everywhere (see spec — `reqwest` with `rustls-tls`).
    # If openssl-sys or openssl ever ends up in the dep tree, it's a regression.
    { crate = "openssl", reason = "use rustls instead — spec mandates no OpenSSL dependency" },
    { crate = "openssl-sys", reason = "use rustls instead — spec mandates no OpenSSL dependency" },
    { crate = "native-tls", reason = "use rustls — spec mandates no OpenSSL dependency" },
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
