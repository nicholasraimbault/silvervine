name: CI

on:
  push:
    branches: [master, v2-rust-rewrite, experimental-bridge]
  pull_request:
    branches: [master, v2-rust-rewrite, experimental-bridge]

# Cancel previous in-flight runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  CARGO_NET_RETRY: 10

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # macOS test job is advisory: V3 experimental-bridge + daemon::ipc
    # tests are tightly coupled to Linux env semantics (XDG_CONFIG_HOME,
    # libvirt sockets, /proc paths, etc.). Project is Linux-primary;
    # macOS support is best-effort and welcomes contributors. The build
    # and clippy macOS jobs stay strict so we don't ship code that
    # can't compile on macOS.
    continue-on-error: ${{ matrix.os == 'macos-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - name: Install Linux daemon dev deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # libvirt-dev: required by the `virt` crate (V3 experimental-bridge)
          # so `--all-features` builds + tests can link `libvirt0`. libgtk-3-dev
          # and libayatana-appindicator3-dev are legacy from the pre-ksni tray
          # era; harmless to keep but no longer required by default builds.
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libvirt-dev pkg-config
      - run: cargo test --all-features --no-fail-fast

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources
          # NOTE: 'advisories' is run via cargo-audit job above. cargo-deny
          # versions <0.17 fail to parse some CVSS-4.0 advisories; once the
          # action ships a newer cargo-deny by default, fold 'advisories' here.

  build-release:
    name: cargo build --release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.os }}
      - name: Install Linux daemon dev deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # libvirt-dev: required by the `virt` crate (V3 experimental-bridge)
          # so `--all-features` builds + tests can link `libvirt0`. libgtk-3-dev
          # and libayatana-appindicator3-dev are legacy from the pre-ksni tray
          # era; harmless to keep but no longer required by default builds.
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libvirt-dev pkg-config
      - run: cargo build --release --verbose

  coverage:
    name: tarpaulin coverage
    runs-on: ubuntu-latest
    # Allow coverage to fail (will tighten as code lands; spec gate is 70% by ship time).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: tarpaulin
      - name: Install Linux daemon dev deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev pkg-config
      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - run: cargo tarpaulin --out Xml --workspace --skip-clean --timeout 300
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: cobertura.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The `@1.85` ref is a *Rust toolchain version*, not an action
      # release tag. Must match `rust-version` in Cargo.toml. Don't let
      # dependabot "bump" this — see the ignore rule in
      # `.github/dependabot.yml`.
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - name: Install Linux daemon dev deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev pkg-config
      - run: cargo build --verbose
