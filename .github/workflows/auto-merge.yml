name: Dependabot auto-merge

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

# Only Dependabot PRs are eligible. Human PRs always require manual review.
permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # NOTE: Dependabot auto-merge is DISABLED. See commit message
      # for the 2026-05-14 incident details. Until `master` has branch
      # protection requiring CI to pass before merge, auto-merge is
      # too dangerous. Re-enable by restoring the approve + merge
      # steps after configuring branch protection.
      - name: Comment with update-type
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: >-
          gh pr comment "$PR_URL" --body "Dependabot update-type: \`$UPDATE_TYPE\`. Auto-merge is currently disabled; merge manually after reviewing CI."
